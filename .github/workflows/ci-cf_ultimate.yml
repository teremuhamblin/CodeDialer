# ============================================================
# AVANT DE LIRE — IMPORTANT
#
# Ce workflow CI/CD est un TOUT‑EN‑UN complet pour CodeDialer.
# Il inclut :
#   ✔ Build Debug + Release
#   ✔ Tests unitaires
#   ✔ Lint Android
#   ✔ ktlint (si configuré)
#   ✔ detekt (si configuré)
#   ✔ Création AVD + lancement émulateur
#   ✔ Tests instrumentés AndroidTest
#   ✔ Analyse CodeQL
#   ✔ Analyse SonarCloud
#   ✔ Release automatique GitHub (APK)
#   ✔ Publication Google Play (track internal)
#   ✔ Distribution Firebase App Distribution
#   ✔ Nightly builds (cron)
#   ✔ Auto-merge Dependabot
#
# Secrets nécessaires :
#   - GITHUB_TOKEN (automatique)
#   - PLAY_STORE_JSON
#   - FIREBASE_TOKEN
#   - FIREBASE_APP_ID
#   - SONAR_TOKEN
#
# Ce fichier est optimisé pour :
#   - AGP 8+
#   - Kotlin 1.9+
#   - Java 17
#   - Hilt, Room, Navigation, ViewBinding
#   - Structure Clean Architecture de CodeDialer
#
# ============================================================

name: CodeDialer CI/CD All-in-One

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 2 * * *"   # Nightly build à 02h00
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------
  # 1. BUILD + UNIT TESTS + LINT + STATIC ANALYSIS
  # ---------------------------------------------------------
  build_test_lint:
    name: Build + Unit Tests + Lint + Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Build Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: ktlint (optional)
        run: ./gradlew ktlintCheck || true

      - name: detekt (optional)
        run: ./gradlew detekt || true


  # ---------------------------------------------------------
  # 2. INSTRUMENTED TESTS (AVD + EMULATOR)
  # ---------------------------------------------------------
  instrumented_tests:
    name: Instrumented Tests (AVD)
    runs-on: ubuntu-latest
    needs: build_test_lint
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name testAVD \
            --package "system-images;android-30;google_apis;x86_64" \
            --device "pixel"

      - name: Start emulator
        run: |
          nohup emulator -avd testAVD -no-snapshot -noaudio -no-window -gpu swiftshader_indirect &
          adb wait-for-device
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Wait for boot
        run: |
          until adb shell getprop sys.boot_completed | grep -m 1 "1"; do sleep 2; done

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build AndroidTest APK
        run: ./gradlew assembleDebugAndroidTest --stacktrace

      - name: Run Instrumented Tests
        run: ./gradlew connectedDebugAndroidTest --stacktrace


  # ---------------------------------------------------------
  # 3. CODEQL SECURITY ANALYSIS
  # ---------------------------------------------------------
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: build_test_lint

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: kotlin

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3


  # ---------------------------------------------------------
  # 4. SONARCLOUD ANALYSIS
  # ---------------------------------------------------------
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build_test_lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # ---------------------------------------------------------
  # 5. RELEASE AUTOMATIQUE (APK)
  # ---------------------------------------------------------
  release:
    name: Release APK
    runs-on: ubuntu-latest
    needs: [build_test_lint, instrumented_tests]

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ---------------------------------------------------------
  # 6. PLAY STORE DEPLOYMENT
  # ---------------------------------------------------------
  playstore:
    name: Deploy to Google Play
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON }}
          packageName: com.codedialer.secretcode
          releaseFiles: app/build/outputs/apk/release/app-release.apk
          track: internal


  # ---------------------------------------------------------
  # 7. FIREBASE APP DISTRIBUTION
  # ---------------------------------------------------------
  firebase:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk


  # ---------------------------------------------------------
  # 8. DEPENDABOT AUTO-MERGE
  # ---------------------------------------------------------
  dependabot:
    name: Dependabot Auto-Merge
    runs-on: ubuntu-latest
    needs: build_test_lint

    steps:
      - uses: fastify/github-action-merge-dependabot@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

