# Ce workflow CI/CD est un TOUT‑EN‑UN complet pour CodeDialer.
# Il inclut :
#   ✔ Build Debug + Release
#   ✔ Tests unitaires
#   ✔ Lint Android
#   ✔ ktlint (si configuré)
