name: Android Instrumented Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  instrumented-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Checkout du repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # JDK 17 (AGP 8+)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Permissions
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Installation des outils Android
      - name: Install Android SDK tools
        uses: android-actions/setup-android@v3

      # Création de l’AVD
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name testAVD \
            --package "system-images;android-30;google_apis;x86_64" \
            --device "pixel"

      # Lancement de l’émulateur
      - name: Start emulator
        run: |
          nohup emulator -avd testAVD -no-snapshot -noaudio -no-window -gpu swiftshader_indirect &
          adb wait-for-device
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      # Attente du boot complet
      - name: Wait for emulator to boot
        run: |
          boot_completed=""
          until [ "$boot_completed" = "1" ]; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            sleep 2
          done
          echo "Emulator booted"

      # Build Debug
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Build AndroidTest APK
      - name: Build AndroidTest APK
        run: ./gradlew assembleDebugAndroidTest --stacktrace

      # Exécution des tests instrumentés
      - name: Run Instrumented Tests
        run: ./gradlew connectedDebugAndroidTest --stacktrace
