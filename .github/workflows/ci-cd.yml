name: CodeDialer CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------
  # 1. BUILD + UNIT TESTS + LINT
  # ---------------------------------------------------------
  build-test-lint:
    name: Build + Unit Tests + Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: ktlint (optional)
        run: ./gradlew ktlintCheck || true

      - name: detekt (optional)
        run: ./gradlew detekt || true


  # ---------------------------------------------------------
  # 2. INSTRUMENTED TESTS (AVD + EMULATOR)
  # ---------------------------------------------------------
  instrumented-tests:
    name: Instrumented Tests (AVD)
    runs-on: ubuntu-latest
    needs: build-test-lint
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Création de l’AVD
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name testAVD \
            --package "system-images;android-30;google_apis;x86_64" \
            --device "pixel"

      # Lancement de l’émulateur
      - name: Start emulator
        run: |
          nohup emulator -avd testAVD -no-snapshot -noaudio -no-window -gpu swiftshader_indirect &
          adb wait-for-device
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      # Attente du boot complet
      - name: Wait for emulator to boot
        run: |
          boot_completed=""
          until [ "$boot_completed" = "1" ]; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            sleep 2
          done
          echo "Emulator booted"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build AndroidTest APK
        run: ./gradlew assembleDebugAndroidTest --stacktrace

      - name: Run Instrumented Tests
        run: ./gradlew connectedDebugAndroidTest --stacktrace


  # ---------------------------------------------------------
  # 3. CODEQL SECURITY ANALYSIS
  # ---------------------------------------------------------
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: build-test-lint

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: kotlin

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3


  # ---------------------------------------------------------
  # 4. RELEASE AUTOMATIQUE (APK)
  # ---------------------------------------------------------
  release:
    name: Release APK
    runs-on: ubuntu-latest
    needs: [build-test-lint, instrumented-tests]

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
